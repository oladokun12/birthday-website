<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Special Surprise 🎁</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #3b0000, #6e0a0a, #a11212);
      color: white;
      text-align: center;
      padding: 40px 10px;
    }

    .container {
      background: rgba(0, 0, 0, 0.35);
      width: 90%;
      max-width: 650px;
      margin: auto;
      padding: 35px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 1.3rem;
      font-weight: normal;
      opacity: 0.9;
    }

    .subtext {
      margin: 20px 0;
      font-size: 1rem;
      opacity: 0.85;
    }

    .gift-btn {
      display: inline-block;
      margin-top: 25px;
      padding: 15px 28px;
      background: #ffffff;
      color: #6e0a0a;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s ease;
    }

    .gift-btn:hover {
      background: #f2f2f2;
      transform: scale(1.05);
    }

    /* Responsive */
    @media (max-width: 480px) {
      h1 {
        font-size: 1.7rem;
      }

      h2 {
        font-size: 1.1rem;
      }

      .gift-btn {
        width: 100%;
        display: block;
      }

      .container {
        padding: 25px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>🎉 A Special Surprise For You 🎉</h1>

    <h2>This may be late… but it comes from the heart ❤️</h2>

    <p class="subtext">
      A small reminder that you are appreciated, valued, and truly special ✨
    </p>

    <!-- Redirect button -->
    <a href="hero.html" class="gift-btn">🎁 Open Your Surprise</a>

  </div>

</body>
</html>
