<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #3b0000, #6e0a0a, #a11212);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    text-align: center;
    animation: fadeIn 1s ease-in;
}

/* Container */
.container {
    max-width: 500px;
    width: 100%;
}

/* Heading */
h1 {
    font-size: 2.5rem;
    color: white;
    margin-bottom: 10px;
}

/* Name */
.glob {
    font-size: 2rem;
    color: mintcream;
    font-family: 'Great Vibes', cursive;
    margin-bottom: 15px;
}

/* Image */
.celebrantpic1 {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    object-fit: cover;
    margin: 15px 0;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* Text */
p {
    font-size: 1.1rem;
    color: white;
    margin: 8px 0;
}

/* Buttons */
.choose {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
    flex-wrap: wrap;
}

.options {
    background: white;
    color: #3b0000;
    padding: 10px 25px;
    border-radius: 50px;
    transition: 0.3s;
}

.options:hover {
    transform: scale(1.1);
}

/* Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* 📱 Mobile */
@media (max-width: 600px) {
    h1 {
        font-size: 2rem;
    }

    .glob {
        font-size: 1.5rem;
    }

    .celebrantpic1 {
        width: 180px;
        height: 180px;
    }

    p {
        font-size: 1rem;
    }
}
        
    </style>
</head>
<body>
    <div class="container">
        <h1> Happy Birthday!!</h1>
        <p class="glob">Global Koroyin</p>
        <img class="celebrantpic1" src="images/celebrant1.1.jpg">
        <p class="wish">You deserve all the happiness in the world! 🎂🎁</p>
        <p >Hope your new year is filled with joy, laughter, and amazing moments!</p>
        <p>Do you want to see the little suprise I have for you?</p>
        <div class="choose">
           <a class="options" href="main.html"> Yes</a> 
           <a class="options" href="main.html"> Yes, I want to 😂 </a>
        </div>
     </div>



</body>
</html>
