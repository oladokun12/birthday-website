<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Pictures of You</title>
</head>
<style>
	*{
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}

body{
	min-height: 100vh;
	background: linear-gradient(135deg, #3b0000, #6e0a0a, #a11212);
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	padding: 20px;
	animation: fadeIn 1s ease-in;
}

/* 📸 Gallery */
.container{
	display: grid;
	grid-template-columns: repeat(3, 1fr);
	gap: 15px;
}

/* 🖼️ Images */
.pic{
	width: 100%;
	height: 150px;
	object-fit: cover;
	border-radius: 10px;
	transition: transform 0.3s ease;
}

/* ✨ Hover effect */
.pic:hover{
	transform: scale(1.05);
}

/* 💖 Special image */
#sheks{
	width: 100%;
	height: 300px;
	object-fit: cover;
	border-radius: 10px;
	grid-column: span 2;
	border: 3px solid white;
	box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* 🔙 Back button */
.back-home{
	margin-top: 30px;
	padding: 10px 20px;
	background: white;
	color: #3b0000;
	text-decoration: none;
	border-radius: 5px;
	transition: 0.3s;
}

.back-home:hover{
	background: #ddd;
}

/* Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* 📱 Mobile */
@media (max-width: 600px){
	.container{
		grid-template-columns: 1fr;
	}

	#sheks{
		grid-column: span 1;
		height: 250px;
	}
}

/* 📲 Tablet */
@media (min-width: 601px) and (max-width: 1024px){
	.container{
		grid-template-columns: repeat(2, 1fr);
	}
}


</style>
<body>
	<h2 style="color:white; margin-bottom:20px;">Moments I Love ❤️</h2>
	<div class="container">
		<div class="memo"><img class="pic" src="images/celebrant1.1.jpg"></div>
		<div class="memo"><img class="pic" src="images/celebrant2.jpg"></div>
		<div class="memo"><img class="pic" src="images/celebrant3.jpg"></div>
		<div class="memo"><img id="sheks" src="images/sheks.jpg"></div>
		<div class="memo"><img class="pic" src="images/celebrant4.jpg"></div>
		<div class="memo"><img class="pic" src="images/celebrant5.jpg"></div>
		<div class="memo"><img class="pic" src="images/celebrant6.jpg"></div>
	</div>
</body>
</html>
